# ─── Brahmastra Nginx Config ───────────────────────────────────────────
# DDoS-resilient reverse proxy with per-IP rate limiting & connection limits
# Dashboard static files served directly by Nginx (never touches Python)

# ── Rate Limiting Zones ────────────────────────────────────────────────
# 10 req/s per IP with small burst buffer. 10MB zone = ~160K unique IPs
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# Max concurrent connections per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Whitelist map (bypass rate limits for admin IPs) ──────────────────
# Add admin IPs here — they will NEVER be rate limited
geo $is_whitelisted {
    default         0;
    103.39.129.253  1;    # Vivek IP
    127.0.0.1       1;    # localhost
    10.0.1.99       1;    # EC2 private IP
}

# Use map to conditionally apply limits (empty = skip limit)
map $is_whitelisted $limit_key {
    0   $binary_remote_addr;
    1   "";
}

# Re-define zones using the mapped key (whitelisted IPs get empty key = no limit)
limit_req_zone $limit_key zone=api_protected:10m rate=10r/s;
limit_conn_zone $limit_key zone=conn_protected:10m;

server {
    listen 8080;
    server_name _;

    # ── Global connection limit per IP ─────────────────────────────────
    limit_conn conn_protected 15;       # Max 15 simultaneous connections per IP
    limit_conn_status 429;

    # ── Rate limit settings ────────────────────────────────────────────
    limit_req_status 429;

    # ── Timeouts (drop slow/hanging attack connections fast) ───────────
    client_body_timeout     5s;
    client_header_timeout   5s;
    send_timeout            10s;
    keepalive_timeout       15s;
    proxy_connect_timeout   5s;
    proxy_read_timeout      30s;

    # ── Request body size limit ────────────────────────────────────────
    client_max_body_size 1m;

    # ── Dashboard Static Files (served directly by Nginx) ─────────────
    # These NEVER touch Python → dashboard loads instantly even under attack
    location / {
        root /home/ubuntu/brahmastra/dashboard;
        index index.html;
        try_files $uri $uri/ =404;

        # Cache static files aggressively
        location ~* \.(html|css|js|png|jpg|svg|ico|woff2?)$ {
            expires 1h;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API Reverse Proxy (rate limited) ──────────────────────────────
    location /api/ {
        # Rate limit: 10 req/s with burst of 20, excess delayed
        limit_req zone=api_protected burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket (needs special headers) ─────────────────────────────
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ── Prometheus Metrics (internal only) ────────────────────────────
    location /metrics {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health Check ──────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ── Block common scanners at Nginx level ──────────────────────────
    location ~* ^/(\.env|wp-admin|phpmyadmin|xmlrpc\.php|\.git) {
        return 444;  # Drop connection instantly — no response body
    }
}
