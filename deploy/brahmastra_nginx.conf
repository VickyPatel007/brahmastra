# ─── Brahmastra Nginx Config ───────────────────────────────────────────
# DDoS-resilient reverse proxy with per-IP rate limiting & connection limits
# Dashboard static files served directly by Nginx (never touches Python)

# ── Rate Limiting Zones ────────────────────────────────────────────────
# Rate limit zone for ALL proxied requests (5 req/s per IP, burst 10)
limit_req_zone $limit_key zone=global_limit:10m rate=5r/s;
# Stricter limit for auth endpoints (2 req/s)
limit_req_zone $limit_key zone=auth_limit:10m rate=2r/s;
# Max concurrent connections per IP
limit_conn_zone $limit_key zone=conn_limit:10m;

# ── Whitelist map (bypass rate limits for admin IPs) ──────────────────
geo $is_whitelisted {
    default         0;
    103.39.129.253  1;    # Vivek IP
    127.0.0.1       1;    # localhost
    10.0.1.99       1;    # EC2 private IP
}

map $is_whitelisted $limit_key {
    0   $binary_remote_addr;
    1   "";
}

server {
    listen 8080;
    server_name _;

    # ── Global connection limit per IP ─────────────────────────────────
    limit_conn conn_limit 10;             # Max 10 simultaneous connections per IP
    limit_conn_status 429;
    limit_req_status 429;

    # ── Timeouts (drop slow/hanging attack connections fast) ───────────
    client_body_timeout     3s;
    client_header_timeout   3s;
    send_timeout            10s;
    keepalive_timeout       5s;
    proxy_connect_timeout   3s;
    proxy_read_timeout      15s;

    # ── Request body size limit ────────────────────────────────────────
    client_max_body_size 1m;

    # ── Block common scanners FIRST (before any proxy) ────────────────
    location ~* ^/(\.env|wp-admin|phpmyadmin|xmlrpc\.php|\.git|db_backup|config\.php) {
        return 444;  # Drop connection instantly — no response body
    }

    # ── Dashboard Static Files (served directly by Nginx) ─────────────
    # These NEVER touch Python → dashboard loads instantly even under attack
    location / {
        root /home/ubuntu/brahmastra/dashboard;
        index index.html;
        try_files $uri $uri/ @backend;

        # Cache static files aggressively
        location ~* \.(html|css|js|png|jpg|svg|ico|woff2?)$ {
            root /home/ubuntu/brahmastra/dashboard;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Fallback to backend for non-file paths ────────────────────────
    location @backend {
        limit_req zone=global_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Auth endpoints (STRICT rate limit: 2 req/s) ───────────────────
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API Reverse Proxy (rate limited) ──────────────────────────────
    location /api/ {
        limit_req zone=global_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket ─────────────────────────────────────────────────────
    location /ws {
        limit_req zone=global_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ── Health Check (rate limited) ───────────────────────────────────
    location /health {
        limit_req zone=global_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Prometheus Metrics (localhost only) ────────────────────────────
    location /metrics {
        # Only allow internal Prometheus scraping
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
