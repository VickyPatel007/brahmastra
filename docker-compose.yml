# ─────────────────────────────────────────────────────────────────────────────
# Brahmastra — Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up -d          # Start all services
#   docker compose down           # Stop all services
#   docker compose logs -f api    # Tail API logs
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Backend API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brahmastra-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - BAN_STATE_FILE=/app/data/bans.json
    volumes:
      - api-data:/app/data
      - api-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - brahmastra-net

  # ── Nginx (Dashboard + Reverse Proxy) ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: brahmastra-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - brahmastra-net

volumes:
  api-data:
  api-logs:

networks:
  brahmastra-net:
    driver: bridge
